spring.application.name=notification-service
server.port=8085

# Shared secret for service-to-service calls (set via INTERNAL_SECRET env var in prod)
internal.secret=${INTERNAL_SECRET:changeme-dev-only}

spring.datasource.url=jdbc:postgresql://localhost:5437/notifications_db
spring.datasource.username=solaris
spring.datasource.password=solaris123

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false
logging.level.org.flywaydb=INFO
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

# Distributed tracing 100 % sampling in dev/prod; set to 0.1 to reduce volume
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
