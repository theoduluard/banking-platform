spring.application.name=auth-service

spring.datasource.url=jdbc:postgresql://localhost:5433/auth_db
spring.datasource.username=solaris
spring.datasource.password=solaris123

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

server.port=8081

jwt.secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
jwt.expiration: 86400000
jwt.refresh-expiration: 604800000

# Admin seed credentials (overridden by ADMIN_EMAIL / ADMIN_PASSWORD env vars in prod)
admin.email=
admin.password=

# Email / SMTP (Brevo by default)
# Override with env vars: SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD
# For Brevo: host=smtp-relay.brevo.com, port=587, username=<your email>, password=<SMTP key>
spring.mail.host=${SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.from=${SMTP_FROM:noreply@solarisbank.demo}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Frontend URL used to build the verification link in emails
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}
