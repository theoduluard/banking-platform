spring.application.name=auth-service

spring.datasource.url=jdbc:postgresql://localhost:5433/auth_db
spring.datasource.username=solaris
spring.datasource.password=solaris123

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
# repair-on-migrate: supprime les entrées FAILED dans flyway_schema_history avant
#   de rejouer les migrations — nécessaire si un précédent déploiement a laissé
#   V1 ou V2 en état FAILED (ex. tables déjà existantes sur un serveur pré-Flyway).
# validate-on-migrate: désactivé pour ignorer les différences de checksum sur V1
#   (le contenu a été rendu idempotent avec IF NOT EXISTS après le premier déploiement).
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false

server.port=8081

jwt.secret=${JWT_SECRET}
jwt.expiration: 86400000
jwt.refresh-expiration: 604800000

# Admin seed credentials (overridden by ADMIN_EMAIL / ADMIN_PASSWORD env vars in prod)
admin.email=
admin.password=

# Email / SMTP (Brevo by default)
# Override with env vars: SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD
# For Brevo: host=smtp-relay.brevo.com, port=587, username=<your email>, password=<SMTP key>
spring.mail.host=${SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.from=${SMTP_FROM:noreply@solarisbank.demo}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Frontend URL used to build the verification link in emails
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

# Distributed tracing 100 % sampling in dev/prod; set to 0.1 to reduce volume
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
