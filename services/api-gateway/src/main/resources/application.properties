spring.application.name=api-gateway
server.port=8080
jwt.secret=${JWT_SECRET}

# Used by CorsConfig to allow credentialed requests from the frontend
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Downstream service URLs overridden in Docker via AUTH_SERVICE_URL, etc.
auth.service.url=http://localhost:8081
account.service.url=http://localhost:8082
transaction.service.url=http://localhost:8083
messaging.service.url=http://localhost:8084
notification.service.url=http://localhost:8085
card.service.url=http://localhost:8086
analytics.service.url=http://localhost:8087
loan.service.url=http://localhost:8088
fraud.service.url=http://localhost:8089
currency.service.url=http://localhost:8090
audit.service.url=http://localhost:8091
document.service.url=http://localhost:8092
# Error handling surface downstream errors instead of generic 500
# Include the actual exception message in error responses so problems with
# downstream services (connection refused, timeouts, etc.) are visible.
server.error.include-message=always

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

# Distributed tracing 100 % sampling in dev/prod; set to 0.1 to reduce volume
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
