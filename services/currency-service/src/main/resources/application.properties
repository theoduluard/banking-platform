spring.application.name=currency-service

spring.datasource.url=jdbc:postgresql://localhost:5444/currency_db
spring.datasource.username=solaris
spring.datasource.password=solaris123

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false
logging.level.org.flywaydb=INFO

server.port=8090

internal.secret=${INTERNAL_SECRET:changeme-dev-only}

# Frankfurter exchange rate API (free, no API key required — ECB data)
# Override with EXCHANGE_API_URL in prod to point to a self-hosted mirror or mock in tests.
exchange.api.url=${EXCHANGE_API_URL:https://api.frankfurter.dev/v1}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
