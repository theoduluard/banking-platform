# ── Base de données H2 en mémoire (remplace PostgreSQL) ──────────────────────
spring.datasource.url=jdbc:h2:mem:transaction_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# ── Kafka désactivé en tests ──────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9999
spring.kafka.listener.auto-startup=false

# ── Account-service stub ──────────────────────────────────────────────────────
account.service.url=http://localhost:8082
