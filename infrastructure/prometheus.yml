global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Development (local) ────────────────────────────────────────────────────────
# Services run on the host machine; Prometheus reaches them via host.docker.internal.
# In production (docker-compose.prod.yml) services are on the banking-net network
# and are referenced by their container names directly.
scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']

  - job_name: 'account-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']

  - job_name: 'transaction-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']
