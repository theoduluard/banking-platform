# Production Docker Compose — TrueNAS Scale
#
# Requires a .env file in the same directory with:
#   DB_PASSWORD=<strong_password>
#   JWT_SECRET=<base64_encoded_256bit_key>
#   JWT_EXPIRATION=86400000
#   JWT_REFRESH_EXPIRATION=604800000
#   ADMIN_EMAIL=<admin_email>
#   ADMIN_PASSWORD=<strong_admin_password>
#
# Traffic flow:
#   Internet → router NAT (external:8081 → VM:8080) → frontend nginx
#   nginx → /          → React SPA (static files)
#   nginx → /api/*     → api-gateway:8080 (internal, not exposed)
#
# First-time setup on the NAS:
#   1. mkdir -p /path/to/banking-platform && cd /path/to/banking-platform
#   2. Copy this file as docker-compose.prod.yml
#   3. Create the .env file with the values above
#   4. echo "$GHCR_TOKEN" | docker login ghcr.io -u <github_user> --password-stdin
#   5. docker compose -f docker-compose.prod.yml up -d

services:

  # ── Databases ──────────────────────────────────────────────────────────────
  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB:       auth_db
      POSTGRES_USER:     solaris
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solaris -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-net

  postgres-accounts:
    image: postgres:16
    container_name: postgres-accounts
    restart: unless-stopped
    environment:
      POSTGRES_DB:       accounts_db
      POSTGRES_USER:     solaris
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-accounts-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solaris -d accounts_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-net

  postgres-transactions:
    image: postgres:16
    container_name: postgres-transactions
    restart: unless-stopped
    environment:
      POSTGRES_DB:       transactions_db
      POSTGRES_USER:     solaris
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-transactions-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solaris -d transactions_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-net

  # ── Message broker ─────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID:                               1
      KAFKA_PROCESS_ROLES:                         broker,controller
      KAFKA_LISTENERS:                             PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS:                  PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS:              1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:        PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:            PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES:             CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:      1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:         1
      CLUSTER_ID:                                  MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - banking-net

  # ── Application services ───────────────────────────────────────────────────
  auth-service:
    image: ghcr.io/theoduluard/banking-platform/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      postgres-auth:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:         jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME:    solaris
      SPRING_DATASOURCE_PASSWORD:    ${DB_PASSWORD}
      JWT_SECRET:                    ${JWT_SECRET}
      JWT_EXPIRATION:                ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION:        ${JWT_REFRESH_EXPIRATION}
      ADMIN_EMAIL:                   ${ADMIN_EMAIL}
      ADMIN_PASSWORD:                ${ADMIN_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # SMTP — Brevo by default (override with any SMTP provider)
      SMTP_HOST:                     ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT:                     ${SMTP_PORT:-587}
      SMTP_USERNAME:                 ${SMTP_USERNAME:-}
      SMTP_PASSWORD:                 ${SMTP_PASSWORD:-}
      SMTP_FROM:                     ${SMTP_FROM:-noreply@solarisbank.demo}
      FRONTEND_URL:                  ${FRONTEND_URL:-http://localhost:5173}
    networks:
      - banking-net

  account-service:
    image: ghcr.io/theoduluard/banking-platform/account-service:latest
    container_name: account-service
    restart: unless-stopped
    depends_on:
      postgres-accounts:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL:         jdbc:postgresql://postgres-accounts:5432/accounts_db
      SPRING_DATASOURCE_USERNAME:    solaris
      SPRING_DATASOURCE_PASSWORD:    ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET:                    ${JWT_SECRET}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - banking-net

  transaction-service:
    image: ghcr.io/theoduluard/banking-platform/transaction-service:latest
    container_name: transaction-service
    restart: unless-stopped
    depends_on:
      postgres-transactions:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL:         jdbc:postgresql://postgres-transactions:5432/transactions_db
      SPRING_DATASOURCE_USERNAME:    solaris
      SPRING_DATASOURCE_PASSWORD:    ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ACCOUNT_SERVICE_URL:           http://account-service:8082
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - banking-net

  api-gateway:
    image: ghcr.io/theoduluard/banking-platform/api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - account-service
      - transaction-service
    environment:
      JWT_SECRET:              ${JWT_SECRET}
      AUTH_SERVICE_URL:        http://auth-service:8081
      ACCOUNT_SERVICE_URL:     http://account-service:8082
      TRANSACTION_SERVICE_URL: http://transaction-service:8083
    # Not exposed externally — nginx handles all incoming traffic
    networks:
      - banking-net

  # ── Frontend (nginx) ───────────────────────────────────────────────────────
  # Serves the React SPA and reverse-proxies /api/* to api-gateway.
  # This is the only container exposed to the host (port 8080 → router NAT 8081).
  frontend:
    image: ghcr.io/theoduluard/banking-platform/frontend:latest
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "8080:80"
    networks:
      - banking-net

  # ── Observability ─────────────────────────────────────────────────────────
  # Prometheus scrapes /actuator/prometheus on each service every 15 s.
  # Grafana (port 3000) is publicly accessible in read-only (anonymous Viewer).
  # The admin login is still available at /login with GRAFANA_PASSWORD.
  # Prometheus stays localhost-only (SSH tunnel required for direct access).
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "127.0.0.1:9090:9090"   # localhost only — SSH tunnel required
    networks:
      - banking-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD:  ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:      'false'
      GF_SERVER_ROOT_URL:          ${GRAFANA_PUBLIC_URL:-http://localhost:3000}
      # Anonymous read-only access — no login required to view dashboards
      GF_AUTH_ANONYMOUS_ENABLED:   'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE:  Viewer
      # Keep the login form so the admin can still authenticate at /login
      GF_AUTH_DISABLE_LOGIN_FORM:  'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"   # Publicly exposed — anonymous Viewer access enabled
    networks:
      - banking-net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-auth-data:
  postgres-accounts-data:
  postgres-transactions-data:
  kafka-data:
  prometheus-data:
  grafana-data:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  banking-net:
    driver: bridge
