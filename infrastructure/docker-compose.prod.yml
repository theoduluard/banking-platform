      SPRING_DATASOURCE_USERNAME:    solaris
      SPRING_DATASOURCE_PASSWORD:    ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS:     kafka:9092
      ACCOUNT_SERVICE_URL:               http://account-service:8082
      INTERNAL_SECRET:                   ${INTERNAL_SECRET}
      SPRING_JPA_HIBERNATE_DDL_AUTO:     validate
      SPRING_FLYWAY_ENABLED:             "true"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE:   "true"
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
    networks:
      - banking-net

  postgres-messaging:
    image: postgres:16
    container_name: postgres-messaging
    restart: unless-stopped
    environment:
      POSTGRES_DB:       messaging_db
      POSTGRES_USER:     solaris
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-messaging-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solaris -d messaging_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-net

  messaging-service:
    image: ghcr.io/theoduluard/banking-platform/messaging-service:latest
