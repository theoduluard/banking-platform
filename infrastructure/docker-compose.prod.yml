      MESSAGING_SERVICE_URL:     http://messaging-service:8084
      NOTIFICATION_SERVICE_URL:  http://notification-service:8085
      CARD_SERVICE_URL:          http://card-service:8086
      ANALYTICS_SERVICE_URL:     http://analytics-service:8087
      LOAN_SERVICE_URL:          http://loan-service:8088
      FRAUD_SERVICE_URL:         http://fraud-service:8089
      CURRENCY_SERVICE_URL:      http://currency-service:8090
      AUDIT_SERVICE_URL:         http://audit-service:8091
      DOCUMENT_SERVICE_URL:      http://document-service:8092
      FRONTEND_URL:              ${FRONTEND_URL:-https://solaris-bank.theoduluard.fr}
    # Not exposed externally — nginx handles all incoming traffic
    networks:
      - banking-net

  # ── Frontend (nginx) ───────────────────────────────────────────────────────
  # Serves the React SPA and reverse-proxies /api/* to api-gateway.
  # Exposed sur le port 8080 — NPM sur le NAS gère le HTTPS et proxifie vers ce port.
  frontend:
    image: ghcr.io/theoduluard/banking-platform/frontend:latest
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "8080:80"
    networks:
      - banking-net


  # ── Observability ─────────────────────────────────────────────────────────
  # Prometheus scrapes /actuator/prometheus on each service every 15 s.
  # Grafana (port 3000) is publicly accessible in read-only (anonymous Viewer).
  # The admin login is still available at /login with GRAFANA_PASSWORD.
  # Prometheus stays localhost-only (SSH tunnel required for direct access).
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "127.0.0.1:9090:9090"   # localhost only — SSH tunnel required
    networks:
      - banking-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD:  ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD secret must be set}
      GF_USERS_ALLOW_SIGN_UP:      'false'
      GF_SERVER_ROOT_URL:          ${GRAFANA_PUBLIC_URL:-http://localhost:3000}
      # Anonymous read-only access — no login required to view dashboards
      GF_AUTH_ANONYMOUS_ENABLED:   'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE:  Viewer
      # Keep the login form so the admin can still authenticate at /login
      GF_AUTH_DISABLE_LOGIN_FORM:  'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"   # Publicly exposed — anonymous Viewer access enabled
    networks:
      - banking-net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-auth-data:
  postgres-accounts-data:
  postgres-transactions-data:
  postgres-messaging-data:
  postgres-notifications-data:
  postgres-cards-data:
  postgres-analytics-data:
  postgres-loans-data:
  postgres-fraud-data:
  postgres-currency-data:
  postgres-audit-data:
  postgres-documents-data:
  kafka-data:
  prometheus-data:
  grafana-data:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  banking-net:
    driver: bridge
