name: Deploy

# Triggered automatically after "Build & Test" succeeds on main.
# Builds Docker images, pushes them to GHCR, then SSH-deploys to TrueNAS Scale.
on:
  workflow_run:
    workflows: ["Build & Test"]
    types: [completed]
    branches: [main]

# Required secrets (Settings → Secrets → Actions):
#   NAS_HOST         – TrueNAS IP or DDNS hostname
#   NAS_USER         – SSH user (e.g. root or admin)
#   NAS_SSH_KEY      – Private SSH key (PEM / OpenSSH format)
#   NAS_PORT         – SSH port (default 22)
#   NAS_DEPLOY_PATH  – Absolute path on the NAS where docker-compose.prod.yml lives
#   GHCR_TOKEN          – GitHub PAT with read:packages scope (for NAS to pull images)
#   JWT_SECRET          – HS256 signing key for JWT tokens (openssl rand -base64 32)
#   INTERNAL_SECRET     – Shared secret for inter-service auth (openssl rand -hex 32)
#   ADMIN_EMAIL         – Bootstrap admin account email
#   ADMIN_PASSWORD      – Bootstrap admin account password (strong)
#   GRAFANA_PASSWORD    – Grafana admin password (optional — defaults to "admin" if not set)
#   GRAFANA_PUBLIC_URL  – Full public URL of Grafana, e.g. http://my-nas.duckdns.org:3000
#                         Used as the sidebar link in the admin UI and as GF_SERVER_ROOT_URL.
#   SMTP_USERNAME       – SMTP login (Brevo: your account email)
#   SMTP_PASSWORD       – SMTP password (Brevo: your SMTP key, not account password)
#   SMTP_FROM           – Sender address shown in emails (e.g. noreply@yourdomain.com)
#   FRONTEND_URL        – Public URL of the frontend, e.g. http://my-nas.duckdns.org:8081
#                         Used to build the verification link inside emails.

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/banking-platform

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Guard — skip the entire workflow if CI did not succeed
  # ─────────────────────────────────────────────────────────────────────────
  check-ci:
    name: CI passed?
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions: {}
    steps:
      - run: echo "CI succeeded — proceeding with deployment."

  # ─────────────────────────────────────────────────────────────────────────
  # Build & push Docker images to GHCR (all services in parallel)
  # ─────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: check-ci

    strategy:
      matrix:
        include:
          - service: auth-service
            dir: services/auth-service
          - service: account-service
            dir: services/account-service
          - service: transaction-service
            dir: services/transaction-service
          - service: messaging-service
            dir: services/messaging-service
          - service: notification-service
            dir: services/notification-service
          - service: api-gateway
            dir: services/api-gateway
          - service: frontend
            dir: frontend

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.dir }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # VITE_GRAFANA_URL is only consumed by the frontend Dockerfile (ARG).
          # Passing it for all services is harmless — others simply ignore it.
          build-args: |
            VITE_GRAFANA_URL=${{ secrets.GRAFANA_PUBLIC_URL }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:buildcache,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Copy the latest docker-compose.prod.yml to the VM, then pull & restart.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to TrueNAS
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Push the up-to-date infrastructure config files to the VM.
      # strip_components: 1 removes the leading "infrastructure/" so that
      # every file lands directly under NAS_DEPLOY_PATH.
      - name: Copy infrastructure config files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key:      ${{ secrets.NAS_SSH_KEY }}
          port:     ${{ secrets.NAS_PORT }}
          source:   "infrastructure/docker-compose.prod.yml,infrastructure/prometheus-prod.yml,infrastructure/grafana"
          target:   ${{ secrets.NAS_DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key:      ${{ secrets.NAS_SSH_KEY }}
          port:     ${{ secrets.NAS_PORT }}
          envs: GHCR_TOKEN,REPO_OWNER,DB_PASSWORD,JWT_SECRET,JWT_EXPIRATION,JWT_REFRESH_EXPIRATION,INTERNAL_SECRET,ADMIN_EMAIL,ADMIN_PASSWORD,GRAFANA_PASSWORD,GRAFANA_PUBLIC_URL,SMTP_USERNAME,SMTP_PASSWORD,SMTP_FROM,FRONTEND_URL
          script: |
            set -e

            # Authenticate to GHCR so private images can be pulled
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$REPO_OWNER" --password-stdin

            cd "${{ secrets.NAS_DEPLOY_PATH }}"

            # Regenerate .env from GitHub secrets so manual docker compose
            # commands on the NAS always work without maintaining the file by hand.
            cat > .env << ENV
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
            JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-604800000}
            ADMIN_EMAIL=${ADMIN_EMAIL}
            ADMIN_PASSWORD=${ADMIN_PASSWORD}
            INTERNAL_SECRET=${INTERNAL_SECRET}
            GRAFANA_PASSWORD=${GRAFANA_PASSWORD:-admin}
            GRAFANA_PUBLIC_URL=${GRAFANA_PUBLIC_URL:-http://localhost:3000}
            SMTP_USERNAME=${SMTP_USERNAME}
            SMTP_PASSWORD=${SMTP_PASSWORD}
            SMTP_FROM=${SMTP_FROM:-noreply@solarisbank.demo}
            FRONTEND_URL=${FRONTEND_URL:-https://solaris-bank.theoduluard.fr}
            ENV
            chmod 600 .env

            # Pull latest images (retry up to 3 times for transient GHCR errors)
            for i in 1 2 3; do
              docker compose -f docker-compose.prod.yml pull && break
              echo "Pull attempt $i failed, retrying in 15s…"
              sleep 15
            done
            # .env has just been regenerated above — docker compose reads it automatically
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate

            # Remove dangling images to save disk space
            docker image prune -f

            echo "Deployment complete."
        env:
          GHCR_TOKEN:              ${{ secrets.GHCR_TOKEN }}
          REPO_OWNER:              ${{ github.repository_owner }}
          DB_PASSWORD:             ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:              ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION:          ${{ secrets.JWT_EXPIRATION }}
          JWT_REFRESH_EXPIRATION:  ${{ secrets.JWT_REFRESH_EXPIRATION }}
          INTERNAL_SECRET:         ${{ secrets.INTERNAL_SECRET }}
          ADMIN_EMAIL:             ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD:          ${{ secrets.ADMIN_PASSWORD }}
          GRAFANA_PASSWORD:        ${{ secrets.GRAFANA_PASSWORD }}
          GRAFANA_PUBLIC_URL:      ${{ secrets.GRAFANA_PUBLIC_URL }}
          SMTP_USERNAME:           ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:               ${{ secrets.SMTP_FROM }}
          FRONTEND_URL:            ${{ secrets.FRONTEND_URL }}