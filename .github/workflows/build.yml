name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ─────────────────────────────────────────
  # auth-service
  # ─────────────────────────────────────────
  auth-service:
    name: auth-service
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: solaris
          POSTGRES_PASSWORD: solaris123
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: services/auth-service
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: ./mvnw verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-coverage
          path: services/auth-service/target/site/jacoco/jacoco.csv
          retention-days: 1

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-jar
          path: services/auth-service/target/*.jar
          retention-days: 7

