        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────
  # Coverage badges (main branch only)
  # Reads JaCoCo CSV artifacts, generates SVG
  # badges and commits them to the repository.
  # ─────────────────────────────────────────
  coverage-badges:
    name: Coverage Badges
    runs-on: ubuntu-latest
    needs: [ auth-service, account-service, transaction-service, api-gateway, messaging-service, notification-service, card-service, analytics-service, loan-service, fraud-service, currency-service, audit-service, document-service ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      # ── Download JaCoCo CSV reports (dans le workspace — requis par l'action Docker) ──
      - name: Download auth-service coverage
        uses: actions/download-artifact@v4
        with:
          name: auth-service-coverage
          path: .github/coverage/auth-service

      - name: Download account-service coverage
        uses: actions/download-artifact@v4
        with:
          name: account-service-coverage
          path: .github/coverage/account-service

      - name: Download transaction-service coverage
        uses: actions/download-artifact@v4
        with:
          name: transaction-service-coverage
          path: .github/coverage/transaction-service

      - name: Download api-gateway coverage
        uses: actions/download-artifact@v4
        with:
          name: api-gateway-coverage
          path: .github/coverage/api-gateway

      - name: Download messaging-service coverage
        uses: actions/download-artifact@v4
        with:
          name: messaging-service-coverage
          path: .github/coverage/messaging-service

      - name: Download notification-service coverage
        uses: actions/download-artifact@v4
        with:
          name: notification-service-coverage
          path: .github/coverage/notification-service

      # ── Generate SVG badges ──────────────────────────────────
      - name: Badge — auth-service
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: .github/coverage/auth-service/jacoco.csv
          badges-directory: .github/badges/auth-service
          coverage-badge-filename: coverage.svg
          generate-branches-badge: false

      - name: Badge — account-service
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: .github/coverage/account-service/jacoco.csv
          badges-directory: .github/badges/account-service
          coverage-badge-filename: coverage.svg
          generate-branches-badge: false

      - name: Badge — transaction-service
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: .github/coverage/transaction-service/jacoco.csv
          badges-directory: .github/badges/transaction-service
          coverage-badge-filename: coverage.svg
          generate-branches-badge: false

      - name: Badge — api-gateway
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: .github/coverage/api-gateway/jacoco.csv
          badges-directory: .github/badges/api-gateway
          coverage-badge-filename: coverage.svg
          generate-branches-badge: false

      - name: Badge — messaging-service
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: .github/coverage/messaging-service/jacoco.csv
          badges-directory: .github/badges/messaging-service
          coverage-badge-filename: coverage.svg
          generate-branches-badge: false

      - name: Badge — notification-service
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: .github/coverage/notification-service/jacoco.csv
          badges-directory: .github/badges/notification-service
          coverage-badge-filename: coverage.svg
          generate-branches-badge: false

      # ── Commit badges ────────────────────────────────────────
      - name: Commit and push badges
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/
          git diff --staged --quiet || (
            git commit -m "chore: update coverage badges [skip ci]"
            git push
          )

  # ─────────────────────────────────────────
  # Build summary
  # ─────────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [ auth-service, account-service, transaction-service, api-gateway, messaging-service, notification-service, card-service, analytics-service, loan-service, fraud-service, currency-service, audit-service, document-service, frontend ]
    if: always()
    permissions: {}

    steps:
      - name: Check results
        run: |
          echo "auth-service         → ${{ needs.auth-service.result }}"
          echo "account-service      → ${{ needs.account-service.result }}"
          echo "transaction-service  → ${{ needs.transaction-service.result }}"
          echo "messaging-service    → ${{ needs.messaging-service.result }}"
          echo "notification-service → ${{ needs.notification-service.result }}"
          echo "card-service         → ${{ needs.card-service.result }}"
          echo "analytics-service    → ${{ needs.analytics-service.result }}"
          echo "loan-service         → ${{ needs.loan-service.result }}"
          echo "fraud-service        → ${{ needs.fraud-service.result }}"
          echo "currency-service     → ${{ needs.currency-service.result }}"
          echo "audit-service        → ${{ needs.audit-service.result }}"
          echo "document-service     → ${{ needs.document-service.result }}"
          echo "api-gateway          → ${{ needs.api-gateway.result }}"
          echo "frontend             → ${{ needs.frontend.result }}"

          if [[ "${{ needs.auth-service.result }}"         != "success" ||
                "${{ needs.account-service.result }}"      != "success" ||
                "${{ needs.transaction-service.result }}"  != "success" ||
                "${{ needs.messaging-service.result }}"    != "success" ||
                "${{ needs.notification-service.result }}" != "success" ||
                "${{ needs.card-service.result }}"         != "success" ||
                "${{ needs.analytics-service.result }}"    != "success" ||
                "${{ needs.loan-service.result }}"         != "success" ||
                "${{ needs.fraud-service.result }}"        != "success" ||
                "${{ needs.currency-service.result }}"     != "success" ||
                "${{ needs.audit-service.result }}"        != "success" ||
                "${{ needs.document-service.result }}"     != "success" ||
                "${{ needs.api-gateway.result }}"          != "success" ||
                "${{ needs.frontend.result }}"             != "success" ]]; then
            echo "One or more services failed to build."
            exit 1
          fi

          echo "All services built successfully."
