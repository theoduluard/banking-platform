name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ─────────────────────────────────────────
  # auth-service
  # ─────────────────────────────────────────
  auth-service:
    name: auth-service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: solaris
          POSTGRES_PASSWORD: solaris123
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: services/auth-service
        run: ./mvnw verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-jar
          path: services/auth-service/target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────
  # account-service
  # ─────────────────────────────────────────
  account-service:
    name: account-service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: accounts_db
          POSTGRES_USER: solaris
          POSTGRES_PASSWORD: solaris123
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: services/account-service
        run: ./mvnw verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: account-service-jar
          path: services/account-service/target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────
  # api-gateway
  # ─────────────────────────────────────────
  api-gateway:
    name: api-gateway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: services/api-gateway
        run: ./mvnw verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-jar
          path: services/api-gateway/target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────
  # Rapport final
  # ─────────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [ auth-service, account-service, api-gateway ]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "auth-service    → ${{ needs.auth-service.result }}"
          echo "account-service → ${{ needs.account-service.result }}"
          echo "api-gateway     → ${{ needs.api-gateway.result }}"

          if [[ "${{ needs.auth-service.result }}"    != "success" ||
                "${{ needs.account-service.result }}" != "success" ||
                "${{ needs.api-gateway.result }}"     != "success" ]]; then
            echo "One or more services failed to build."
            exit 1
          fi

          echo "All services built successfully."
