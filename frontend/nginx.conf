server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────────
    # CSP: only load resources from our own origin; allow Unsplash for the login
    # background image; inline styles are needed by Tailwind/shadcn.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com; connect-src 'self'; font-src 'self' data:; object-src 'none'; frame-ancestors 'none';"
        always;
    add_header X-Frame-Options          "DENY"                            always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    # HSTS — force HTTPS for 2 years, including sub-domains; pre-load eligible
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Proxy all API calls to the api-gateway (internal Docker network)
    location /api/ {
        proxy_pass         http://api-gateway:8080/api/;
        proxy_http_version 1.1;

        # Explicitly preserve the Authorization header so intermediate proxies
        # (e.g. Nginx Proxy Manager) cannot silently strip it.
        proxy_set_header   Authorization      $http_authorization;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Allow large JSON bodies (base64-encoded documents / attachments)
        client_max_body_size 25M;
    }

    # SPA fallback — all non-file routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    # NOTE: this block has its own add_header directives, so nginx does NOT
    # inherit the parent-block headers — all required security headers must
    # be repeated here explicitly.
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control                  "public, immutable"                    always;
        add_header X-Content-Type-Options         "nosniff"                              always;
        add_header Strict-Transport-Security      "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Resource-Policy   "same-site"                            always;
    }
}
